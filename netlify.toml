# Netlify 배포 설정 - Next.js(SSR) + Prisma(Supabase Postgres)
# Netlify 는 Next.js 를 감지해 공식 런타임(@netlify/plugin-nextjs)을 자동 적용합니다.
# 빌드 시 Prisma 클라이언트 생성 + Supabase 스키마 반영(db push) 후 next build 를 실행합니다.

[build]
  command = "npm run build"

[build.environment]
  # Prisma 바이너리 캐시 경고 억제 및 안정적 빌드
  NODE_VERSION = "20"
  PRISMA_HIDE_UPDATE_MESSAGE = "true"

# 참고: 아래 환경변수는 Netlify 사이트 설정(Site settings → Environment variables)에 등록하세요.
#   DATABASE_URL   : Supabase 연결 문자열 (권장: Session/Direct connection)
#   ADMIN_PASSWORD : 관리자 로그인 비밀번호 (미설정 시 기본값 931122)
#   AUTH_SECRET    : 세션 쿠키용 토큰 (임의의 긴 문자열 권장)
